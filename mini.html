<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixeldoro Mini - Focus, simplified</title>
    <meta name="description" content="Pixeldoro Mini is a simplified focus app with a pomodoro timer, pixel art backgrounds, lofi music, and stats. Available on iOS, macOS, and Android.">
    <meta name="keywords" content="pixeldoro mini, pomodoro, focus app, timer, pixel art, lofi, productivity, minimal, simple timer">
    <meta name="robots" content="index, follow">
    <link rel="icon" sizes="32x32" href="images/favicon.ico">
    <link rel="shortcut icon" href="images/favicon.ico">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pixeldoro.io/mini.html">
    <meta property="og:title" content="Pixeldoro Mini - Focus, simplified">
    <meta property="og:description" content="Just a timer. Pixel art backgrounds. Lofi music. Stats. That's it.">
    <meta property="og:image" content="https://pixeldoro.io/images/pixel-mini.png">
    <meta property="og:site_name" content="Pixeldoro">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://pixeldoro.io/mini.html">
    <meta name="twitter:title" content="Pixeldoro Mini - Focus, simplified">
    <meta name="twitter:description" content="Just a timer. Pixel art backgrounds. Lofi music. Stats. That's it.">
    <meta name="twitter:image" content="https://pixeldoro.io/images/pixel-mini.png">
    <meta name="twitter:site" content="@pixeldoro">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            line-height: 1.6;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        .main-text {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        .sub-text {
            font-size: 16px;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .app-preview {
            margin: 0 auto 40px;
            max-width: 320px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
        }

        .app-preview img {
            width: 100%;
            height: auto;
            display: block;
            border: 8px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 40px;
        }
        
        .app-button {
            display: block;
            width: 100%;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .app-button img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .app-button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        .app-button:active {
            transform: translateY(0);
        }
        
        .footer-text {
            font-size: 12px;
            opacity: 0.4;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Fun animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container > * {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        
        .logo { animation-delay: 0.1s; }
        h1 { animation-delay: 0.2s; }
        .main-text { animation-delay: 0.3s; }
        .sub-text { animation-delay: 0.4s; }
        .buttons { animation-delay: 0.5s; }
        .divider { animation-delay: 0.6s; }
        .desktop-link { animation-delay: 0.7s; }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/logo.png" alt="pixeldoro logo" class="logo">
        
        <h1>pixeldoro mini</h1>

        <p class="main-text">
            just a timer. pixel art backgrounds. lofi music. stats. that’s it.
        </p>

        <p class="sub-text">
            focus, simplified 👇
        </p>

        <div class="app-preview">
            <img src="images/pixel-mini.png" alt="pixeldoro mini screenshot">
        </div>

        <div class="buttons">
            <a href="https://play.pixeldoro.io/pixel-mini-apple" class="app-button">
                <img src="images/app_store_badge.png" alt="Download on the App Store">
            </a>
            <a href="https://play.pixeldoro.io/pixel-mini-android" class="app-button">
                <img src="images/google_play_badge.png" alt="Get it on Google Play">
            </a>
        </div>
    </div>

    <p class="footer-text">made with 🍅 by pixeldoro labs</p>
</body>
</html>
